name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest pytest-cov pytest-asyncio black ruff mypy pre-commit types-setuptools types-paramiko types-PyYAML keyring
    
    - name: Lint with ruff
      run: |
        ruff check remote_cmd tests --output-format=github
    
    - name: Check code formatting with ruff
      run: |
        ruff format remote_cmd tests --check
    
    - name: Type check with mypy
      run: mypy remote_cmd --no-strict-optional --ignore-missing-imports
    
    - name: Run tests with pytest
      run: |
        pytest tests/ --cov=remote_cmd --cov-report=xml --cov-report=term 2>&1 | tee pytest_output.txt
        exit_code=${PIPESTATUS[0]}
        if [ $exit_code -ne 0 ] && [ -s pytest_output.txt ]; then
          grep -E "FAILED|ERROR|failed" pytest_output.txt | head -10 > /tmp/pytest_errors.txt
          while IFS= read -r line; do
            echo "::error title=pytest::$line"
          done < /tmp/pytest_errors.txt
          if [ ! -s /tmp/pytest_errors.txt ]; then
            tail -5 pytest_output.txt > /tmp/pytest_tail.txt
            while IFS= read -r line; do
              echo "::error title=pytest-tail::$line"
            done < /tmp/pytest_tail.txt
          fi
        fi
        exit $exit_code
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel
    
    - name: Build package
      run: python -m build
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
