name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest pytest-cov black ruff mypy pre-commit types-setuptools types-paramiko types-PyYAML
    
    - name: Lint with ruff
      run: |
        ruff check remote_cmd tests --output-format=github
    
    - name: Check code formatting with ruff
      run: |
        ruff format remote_cmd tests --check
    
    - name: Type check with mypy
      run: |
        echo "::group::mypy version"
        mypy --version
        echo "::endgroup::"
        echo "::group::sanity check"
        echo 'x: int = 1' > /tmp/test_mypy.py
        mypy /tmp/test_mypy.py && echo "sanity OK" || echo "sanity FAILED"
        echo "::endgroup::"
        echo "::group::mypy output"
        mypy remote_cmd --no-strict-optional --ignore-missing-imports 2>&1 | tee /tmp/mypy_output.txt
        exit_code=${PIPESTATUS[0]}
        echo "::endgroup::"
        echo "::group::annotations"
        if [ $exit_code -ne 0 ] && [ -s /tmp/mypy_output.txt ]; then
          head -50 /tmp/mypy_output.txt > /tmp/mypy_head.txt
          while IFS= read -r line; do
            echo "::error title=mypy::$line"
          done < /tmp/mypy_head.txt
        fi
        echo "::endgroup::"
        exit $exit_code
    
    - name: Run tests with pytest
      run: |
        pytest tests/ --cov=remote_cmd --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel
    
    - name: Build package
      run: python -m build
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
