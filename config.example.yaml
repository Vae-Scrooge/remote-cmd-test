# Default configuration file for Remote CMD
# Copy this file to config.yaml and modify as needed

# Hosts configuration file path
hosts_file: hosts.json

# Default SSH settings
default_ssh_port: 22
default_timeout: 30

# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level: INFO

# Host key policy: auto_add, warn (default), reject
# - warn: 首次连接时显示警告（推荐）
# - auto_add: 自动接受新主机密钥（注意：容易受到 MITM 攻击）
# - reject: 严格验证，未知密钥拒绝连接
# host_key_policy: warn
